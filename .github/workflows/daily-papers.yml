name: Daily Papers

# 每天 08:17 UTC(北京 16:17)生成前一天的论文速递并提交。
# 选这个时间:arXiv 每日新批次在 20:00 ET(= 次日 00:00 UTC)公布后,
# 约 05:00 UTC 才进 API,过早跑会拿不到 arXiv 侧数据。
# 有新内容时显式 dispatch Deploy 上线;任一步骤失败自动开 Issue 提醒。
on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "内容日期 YYYY-MM-DD(留空 = 昨天 UTC)"
        required: false
        type: string

permissions:
  contents: write
  actions: write
  issues: write

concurrency:
  group: daily-papers
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve date
        id: d
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -z "$DATE" ]; then DATE=$(date -u -d "yesterday" +%F); fi
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Fetch daily papers
        run: python3 scripts/fetch-daily-papers.py --date "${{ steps.d.outputs.date }}"

      # 无 key 时脚本会跳过(速递页照常出英文版),不阻塞发布
      - name: Add AI Chinese summaries
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python3 scripts/summarize-digest.py "${{ steps.d.outputs.date }}"

      - name: Commit digest
        id: commit
        run: |
          if [ -z "$(git status --porcelain content/papers)" ]; then
            echo "No new digest to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/papers
          git commit -m "content: 论文速递 ${{ steps.d.outputs.date }}"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # GITHUB_TOKEN 的 push 不会触发其他 workflow(GitHub 防递归),
      # 有新内容时显式 dispatch Deploy
      - name: Trigger deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main

      # 任一步骤失败时开 Issue 提醒(成功信号 = bot 的 content 提交本身)
      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --title "Daily Papers 失败:${{ steps.d.outputs.date || 'unknown' }}" \
            --body "每日论文抓取 workflow 运行失败,请查看日志:$RUN_URL"$'\n\n'"时间(UTC):$(date -u +'%F %T')" \
            --assignee "${{ github.repository_owner }}"
